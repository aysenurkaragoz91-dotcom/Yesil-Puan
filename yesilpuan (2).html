<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YesilPuan</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f0f5ef; --panel:#fff; --ink:#0e1f0e; --muted:#4d6350;
      --line:#d4e0d4; --brand:#2a6e35; --brand-light:#eaf4ec;
      --brand-mid:#5a9e65; --accent:#b8d44f;
      --danger:#9b2a2a; --warn:#8a5c00; --warn-bg:#fff8e6; --good-bg:#e8f7ed;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);
      background-image:radial-gradient(circle at 10% 20%,rgba(90,158,101,.07) 0%,transparent 50%),
                       radial-gradient(circle at 90% 80%,rgba(184,212,79,.08) 0%,transparent 50%);
      color:var(--ink);min-height:100vh}
    .container{max-width:860px;margin:0 auto;padding:24px 16px 64px;display:grid;gap:16px}

    /* HEADER */
    .header-panel{background:linear-gradient(135deg,#1d5228 0%,#2e7b3a 55%,#3d9e4c 100%);border-radius:20px;padding:36px 32px;position:relative;overflow:hidden}
    .header-panel::before{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:rgba(184,212,79,.12)}
    .header-panel::after{content:'';position:absolute;bottom:-20px;left:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
    .header-wordmark{font-family:'Fraunces',serif;font-size:2.6rem;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1}
    .header-wordmark span{color:var(--accent)}
    .header-tagline{margin-top:8px;color:rgba(255,255,255,.72);font-size:.95rem}

    /* PANEL */
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .panel h2{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--brand);letter-spacing:.01em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .panel h2::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent)}
    h3{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:20px 0 10px}

    /* INPUTS */
    .search-row{display:flex;gap:8px;flex-wrap:wrap}
    input[type=text]{flex:1;min-width:200px;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);background:#fafcfa;transition:border-color .2s,box-shadow .2s}
    input[type=text]:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(42,110,53,.1)}
    button{border:none;border-radius:10px;padding:11px 20px;background:var(--brand);color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
    button:hover{background:#225c2c}
    button:active{transform:scale(.97)}
    button.alt{background:var(--brand-light);color:#1a4821;border:1px solid #c3d9c7;font-weight:500;padding:7px 13px;font-size:.85rem}
    button.alt:hover{background:#d9eede}
    button.ghost{background:transparent;color:var(--brand);border:1.5px solid var(--brand-mid);padding:8px 16px}
    button.ghost:hover{background:var(--brand-light)}

    .muted{color:var(--muted)}
    .danger{color:var(--danger)}

    /* BRAND LIST */
    #quickList{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .show-more-btn{background:none;border:1.5px dashed #b0c8b4;color:var(--muted);border-radius:10px;padding:7px 14px;font-size:.85rem;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
    .show-more-btn:hover{background:var(--brand-light);color:var(--brand);border-color:var(--brand-mid)}

    /* CHIPS */
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .chip{display:inline-flex;align-items:center;border:1px solid #cfe0d2;background:#f0f9f2;border-radius:999px;padding:4px 11px;font-size:.82rem;color:#1f5027}

    /* PROFILE */
    .profile-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .avatar-wrap{position:relative;cursor:pointer;flex-shrink:0}
    .avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-mid));display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden;border:2px solid #c3d9c7;transition:border-color .2s}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-wrap:hover .avatar{border-color:var(--brand)}
    .avatar-edit-hint{position:absolute;bottom:-2px;right:-2px;background:var(--brand);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .profile-meta{flex:1;min-width:140px}
    .profile-name-row{display:flex;align-items:center;gap:8px}
    .profile-name{font-weight:600;font-size:1rem}
    .edit-name-btn{background:none;border:none;padding:2px 6px;font-size:.78rem;color:var(--brand-mid);cursor:pointer;border-radius:6px}
    .edit-name-btn:hover{background:var(--brand-light)}
    .profile-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:4px}
    .stat-box{text-align:center}
    .stat-val{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;color:var(--brand);line-height:1}
    .stat-lbl{font-size:.75rem;color:var(--muted);margin-top:2px}
    .badge-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .badge-share-btn{background:none;border:none;padding:2px 7px;font-size:.78rem;color:var(--brand-mid);cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif}
    .badge-share-btn:hover{background:var(--brand-light);color:var(--brand)}

    /* MODAL BASE */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:18px;padding:28px;width:min(420px,95vw);box-shadow:0 20px 60px rgba(0,0,0,.18);animation:fadeUp .25s ease both}
    .modal h3{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--brand);text-transform:none;letter-spacing:0;margin-bottom:18px}
    .modal label{display:block;font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:5px}
    .modal input[type=text]{width:100%;margin-bottom:14px}
    .avatar-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .avatar-opt{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:border-color .15s,transform .1s}
    .avatar-opt:hover{border-color:var(--brand-mid);transform:scale(1.1)}
    .avatar-opt.selected{border-color:var(--brand);box-shadow:0 0 0 3px rgba(42,110,53,.18)}
    .upload-label{width:46px;height:46px;border-radius:50%;border:2px dashed var(--brand-mid);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;color:var(--brand);transition:background .15s}
    .upload-label:hover{background:var(--brand-light)}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

    /* SHARE MODAL */
    .share-modal-content{text-align:center}
    .share-preview{background:linear-gradient(135deg,#1d5228,#3d9e4c);border-radius:14px;padding:28px 24px;margin:16px 0;color:#fff;position:relative;overflow:hidden}
    .share-preview::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;border-radius:50%;background:rgba(184,212,79,.15)}
    .share-badge-emoji{font-size:3rem;display:block;margin-bottom:8px}
    .share-badge-name{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700}
    .share-badge-sub{font-size:.82rem;opacity:.75;margin-top:4px}
    .share-badge-user{font-size:.78rem;opacity:.6;margin-top:10px}
    .share-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px}
    .share-btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
    .share-btn:active{transform:scale(.97)}
    .share-btn.twitter{background:#000;color:#fff}
    .share-btn.whatsapp{background:#25D366;color:#fff}
    .share-btn.copy{background:var(--brand);color:#fff}
    .share-btn:hover{opacity:.88}

    /* RESULT */
    .score-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px}
    .brand-name{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;color:var(--ink);line-height:1.1}
    .brand-cat{font-size:.85rem;color:var(--muted);margin-top:3px}
    .score-badge{border-radius:12px;padding:10px 18px;font-weight:700;text-align:center;min-width:100px}
    .score-badge .score-num{font-family:'Fraunces',serif;font-size:1.8rem;display:block;line-height:1}
    .score-badge .score-grade{font-size:.78rem;opacity:.85;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .score-good{background:var(--good-bg);color:#1a5c27}
    .score-warn{background:var(--warn-bg);color:var(--warn)}
    .score-bad{background:#fdeaea;color:var(--danger)}
    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:500px){.metrics-grid{grid-template-columns:1fr}}
    .metric-item{background:#fafcfa;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .metric-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .metric-key{font-size:.82rem;color:var(--muted)}
    .metric-val{font-family:'Fraunces',serif;font-weight:600;font-size:.95rem;color:var(--ink)}
    .bar{width:100%;height:6px;border-radius:999px;background:#e4ede4;overflow:hidden}
    .bar-fill{height:100%;border-radius:999px;background:linear-gradient(to right,var(--brand-mid),var(--accent));transition:width .6s cubic-bezier(.22,.68,0,1.2)}
    .issue-list{list-style:none;display:grid;gap:6px}
    .issue-list li{background:#fff8e6;border:1px solid #f0dfa0;border-radius:8px;padding:8px 12px;font-size:.875rem;color:#6b4800;display:flex;gap:8px;align-items:flex-start}
    .issue-list li::before{content:'⚠';font-size:.75rem;margin-top:1px;flex-shrink:0}
    .alt-card{display:inline-flex;align-items:center;gap:8px;background:var(--brand-light);border:1px solid #c3d9c7;border-radius:10px;padding:7px 13px;font-size:.875rem;color:#1a4821;cursor:pointer;transition:background .15s}
    .alt-card:hover{background:#d4ecda}
    .alt-score{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;color:var(--brand)}
    .switch-hint{margin-top:12px;padding:12px 14px;background:#fdeaea;border:1px solid #f0c0c0;border-radius:10px;font-size:.875rem;color:var(--danger)}
    .action-row{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .empty-state{text-align:center;padding:32px 16px;color:var(--muted)}
    .empty-state .leaf{font-size:2.5rem;display:block;margin-bottom:10px}

    /* TOAST */
    .badge-toast{position:fixed;bottom:24px;right:24px;background:#fff;border:2px solid var(--accent);border-radius:14px;padding:12px 18px;box-shadow:0 8px 32px rgba(0,0,0,.12);font-size:.9rem;font-weight:600;color:var(--ink);animation:toastIn .4s cubic-bezier(.22,.68,0,1.4) both,toastOut .3s 3s ease forwards;z-index:100}
    @keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(10px);pointer-events:none}}
    #searchMessage{margin-top:10px;font-size:.875rem;min-height:20px;transition:color .2s}
  </style>
</head>
<body>
<main class="container">

  <header class="header-panel">
    <div class="header-wordmark">Yesil<span>Puan</span></div>
    <p class="header-tagline">Türkiye odaklı sürdürülebilir marka skorlama asistanı</p>
  </header>

  <section class="panel">
    <h2>Marka Sorgula</h2>
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Örn: Koton, Arçelik, Trendyol">
      <button id="searchBtn">Sorgula</button>
    </div>
    <div id="quickList"></div>
    <p id="searchMessage" class="muted"></p>
  </section>

  <section class="panel">
    <h2>Profilim</h2>
    <div id="profile"></div>
  </section>

  <section class="panel">
    <h2>Sonuç</h2>
    <div id="result">
      <div class="empty-state"><span class="leaf">🌿</span>Bir marka seçip sorguladığında kart burada gösterilecek.</div>
    </div>
  </section>
</main>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <h3>✏️ Profili Düzenle</h3>
    <label>Kullanıcı Adı</label>
    <input type="text" id="editName" placeholder="Adınızı girin">
    <label>Avatar Seç</label>
    <div class="avatar-picker" id="avatarPicker">
      <div class="avatar-opt selected" data-emoji="🌿">🌿</div>
      <div class="avatar-opt" data-emoji="🌱">🌱</div>
      <div class="avatar-opt" data-emoji="🍃">🍃</div>
      <div class="avatar-opt" data-emoji="🌍">🌍</div>
      <div class="avatar-opt" data-emoji="♻️">♻️</div>
      <div class="avatar-opt" data-emoji="🦋">🦋</div>
      <div class="avatar-opt" data-emoji="🐢">🐢</div>
      <div class="avatar-opt" data-emoji="🌸">🌸</div>
      <label class="upload-label" title="Fotoğraf yükle">📷<input type="file" accept="image/*" id="avatarUpload" style="display:none"></label>
    </div>
    <div class="modal-btns">
      <button class="ghost" id="cancelEdit">İptal</button>
      <button id="saveEdit">Kaydet</button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="shareModal">
  <div class="modal share-modal-content">
    <h3>🏅 Rozeti Paylaş</h3>
    <div class="share-preview" id="sharePreview">
      <span class="share-badge-emoji" id="shareBadgeEmoji"></span>
      <div class="share-badge-name" id="shareBadgeName"></div>
      <div class="share-badge-sub">YesilPuan rozeti kazanıldı! 🌱</div>
      <div class="share-badge-user" id="shareBadgeUser"></div>
    </div>
    <div class="share-btns">
      <button class="share-btn twitter"  id="shareTwitter">𝕏 Twitter</button>
      <button class="share-btn whatsapp" id="shareWhatsApp">💬 WhatsApp</button>
      <button class="share-btn copy"     id="shareCopy">📋 Kopyala</button>
    </div>
    <div style="margin-top:14px;text-align:right">
      <button class="ghost" id="closeShare" style="padding:7px 14px;font-size:.85rem">Kapat</button>
    </div>
  </div>
</div>

<script>
const WEIGHTS={karbon:.25,su:.15,emek:.2,ambalaj:.15,seffaflik:.15,yerellik:.1};
const MLABELS={karbon:'Karbon',su:'Su',emek:'Emek',ambalaj:'Ambalaj',seffaflik:'Şeffaflık',yerellik:'Yerellik'};

const BADGES=[
  {id:"first_query",  emoji:"🌱",name:"İlk Sorgu",    xp:50, condition:s=>s.totalQueries>=1},
  {id:"five_queries", emoji:"🌳",name:"5 Sorgu",       xp:100,condition:s=>s.totalQueries>=5},
  {id:"ten_queries",  emoji:"🌲",name:"10 Sorgu",      xp:200,condition:s=>s.totalQueries>=10},
  {id:"switcher",     emoji:"♻️",name:"Dönüştürücü",  xp:75, condition:s=>(s.switchCount||0)>=1},
  {id:"explorer",     emoji:"🔭",name:"Kaşif",         xp:80, condition:s=>s.searchedBrands.size>=5},
  {id:"eco_champion", emoji:"🏆",name:"Eko Şampiyon", xp:300,condition:s=>s.totalQueries>=20},
  {id:"level2",       emoji:"⭐",name:"Seviye 2",      xp:50, condition:s=>Math.floor(s.xp/500)+1>=2},
];

const BRANDS=[
  // Elektronik & Beyaz Eşya (4)
  {id:"arcelik",    name:"Arçelik",            cat:"Elektronik & Beyaz Eşya",   scores:{karbon:75,su:72,emek:82,ambalaj:80,seffaflik:78,yerellik:84},issues:["E-atık geri dönüşüm kapasitesi artırılabilir"],certifications:["ISO 14001","ISO 50001"]},
  {id:"vestel",     name:"Vestel",             cat:"Elektronik & Beyaz Eşya",   scores:{karbon:68,su:65,emek:70,ambalaj:72,seffaflik:64,yerellik:80},issues:["Karbon raporu eksik","Tedarik zinciri belirsiz"],certifications:["ISO 14001"]},
  {id:"beko",       name:"Beko",               cat:"Elektronik & Beyaz Eşya",   scores:{karbon:70,su:68,emek:74,ambalaj:74,seffaflik:70,yerellik:72},issues:["Enerji verimliliği iyileştirilebilir"],certifications:["ISO 14001","Energy Star"]},
  {id:"tp_link",    name:"TP-Link TR",         cat:"Elektronik & Beyaz Eşya",   scores:{karbon:44,su:50,emek:52,ambalaj:48,seffaflik:40,yerellik:35},issues:["Tedarik zinciri şeffaflığı düşük","E-atık politikası yok"],certifications:[]},
  // Tekstil & Moda (7)
  {id:"koton",      name:"Koton",              cat:"Tekstil & Moda",            scores:{karbon:38,su:35,emek:44,ambalaj:48,seffaflik:40,yerellik:42},issues:["Su tüketimi yüksek","Emek koşulları belirsiz"],certifications:[]},
  {id:"lcwaikiki",  name:"LC Waikiki",         cat:"Tekstil & Moda",            scores:{karbon:42,su:40,emek:46,ambalaj:50,seffaflik:44,yerellik:60},issues:["Fast fashion modeli","Kimyasal kullanımı denetlenmeli"],certifications:[]},
  {id:"mavi",       name:"Mavi",               cat:"Tekstil & Moda",            scores:{karbon:58,su:52,emek:62,ambalaj:60,seffaflik:56,yerellik:70},issues:["Denim üretiminde su kullanımı yüksek"],certifications:["Better Cotton Initiative"]},
  {id:"defacto",    name:"DeFacto",            cat:"Tekstil & Moda",            scores:{karbon:40,su:38,emek:45,ambalaj:46,seffaflik:42,yerellik:55},issues:["Sürdürülebilirlik hedefleri net değil"],certifications:[]},
  {id:"vakko",      name:"Vakko",              cat:"Tekstil & Moda",            scores:{karbon:55,su:58,emek:68,ambalaj:60,seffaflik:54,yerellik:65},issues:["Raporlama eksik"],certifications:[]},
  {id:"ipekyol",    name:"İpekyol",            cat:"Tekstil & Moda",            scores:{karbon:52,su:50,emek:64,ambalaj:56,seffaflik:50,yerellik:68},issues:["Kimyasal boya kullanımı denetlenmeli"],certifications:[]},
  {id:"adl",        name:"ADL",                cat:"Tekstil & Moda",            scores:{karbon:60,su:55,emek:66,ambalaj:58,seffaflik:55,yerellik:72},issues:["Ambalaj geri dönüşüm oranı düşük"],certifications:["OEKO-TEX"]},
  // Süt & Süt Ürünleri (3)
  {id:"sutas",      name:"Sütaş",              cat:"Süt & Süt Ürünleri",        scores:{karbon:65,su:68,emek:74,ambalaj:64,seffaflik:70,yerellik:82},issues:["Ambalaj plastik oranı azaltılabilir"],certifications:["ISO 14001"]},
  {id:"yoruk",      name:"Yörük Süt",          cat:"Süt & Süt Ürünleri",        scores:{karbon:80,su:78,emek:84,ambalaj:76,seffaflik:82,yerellik:92},issues:["Dağıtım ağı sınırlı"],certifications:["Organik Tarım Sertifikası"]},
  {id:"pinar",      name:"Pınar",              cat:"Süt & Süt Ürünleri",        scores:{karbon:62,su:64,emek:70,ambalaj:60,seffaflik:65,yerellik:76},issues:["Ambalaj geri dönüşüm oranı düşük"],certifications:["ISO 14001"]},
  // Gıda & Atıştırmalık (6)
  {id:"ulker",      name:"Ülker",              cat:"Gıda & Atıştırmalık",       scores:{karbon:52,su:55,emek:60,ambalaj:52,seffaflik:58,yerellik:68},issues:["Palm yağı kullanımı","Şeker tedariki denetlenmeli"],certifications:["ISO 14001"]},
  {id:"eti",        name:"Eti",                cat:"Gıda & Atıştırmalık",       scores:{karbon:55,su:57,emek:62,ambalaj:54,seffaflik:60,yerellik:70},issues:["Ambalaj fazlası","Enerji yoğun üretim"],certifications:[]},

const INITIAL_SHOWN=12;
const state={
  brands:[],selectedBrand:null,allShown:false,
  user:{name:"Kullanıcı",avatarType:"emoji",avatarValue:"🌿",xp:0,totalQueries:0,switchCount:0,searchedBrands:new Set(),earnedBadges:[]},
};

// UTILS
function norm(v){return(v||"").toLowerCase().replaceAll("ç","c").replaceAll("ğ","g").replaceAll("ı","i").replaceAll("ö","o").replaceAll("ş","s").replaceAll("ü","u").trim()}
function calcScore(s){let t=0;for(const[k,w]of Object.entries(WEIGHTS))t+=(s[k]||0)*w;return Math.round(t)}
function getGrade(s){
  if(s>=80)return{label:"Mükemmel",cls:"score-good"};
  if(s>=70)return{label:"İyi",cls:"score-good"};
  if(s>=55)return{label:"Orta",cls:"score-warn"};
  if(s>=40)return{label:"Zayıf",cls:"score-bad"};
  return{label:"Çok Kötü",cls:"score-bad"};
}
function findAlts(brand){
  const cur=calcScore(brand.scores);
  return state.brands.filter(b=>b.id!==brand.id&&b.cat===brand.cat)
    .map(b=>({...b,computedScore:calcScore(b.scores)}))
    .filter(b=>b.computedScore>cur).sort((a,b)=>b.computedScore-a.computedScore).slice(0,3);
}
function showToast(msg){
  document.querySelectorAll('.badge-toast').forEach(t=>t.remove());
  const el=document.createElement('div');el.className='badge-toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
}
function evalBadges(){
  const earned=[];
  for(const b of BADGES){
    if(!state.user.earnedBadges.includes(b.id)&&b.condition(state.user)){
      state.user.earnedBadges.push(b.id);state.user.xp+=b.xp;earned.push(b);
    }
  }
  return earned;
}

// RENDER QUICK LIST
function renderQuickList(){
  const el=document.getElementById("quickList");
  const shown=state.allShown?state.brands:state.brands.slice(0,INITIAL_SHOWN);
  const btns=shown.map(b=>`<button class="alt" data-id="${b.id}">${b.name}</button>`).join('');
  const remaining=state.brands.length-INITIAL_SHOWN;
  const moreBtn=!state.allShown&&remaining>0
    ?`<button class="show-more-btn" id="showMoreBtn">+${remaining} marka daha →</button>`
    :state.allShown?`<button class="show-more-btn" id="showMoreBtn">↑ Daha az göster</button>`:'';
  el.innerHTML=btns+moreBtn;
  document.getElementById("showMoreBtn")?.addEventListener("click",()=>{state.allShown=!state.allShown;renderQuickList();});
}

// RENDER PROFILE
function renderProfile(){
  const el=document.getElementById("profile");
  const level=Math.floor(state.user.xp/500)+1;
  const avatarInner=state.user.avatarType==="img"
    ?`<img src="${state.user.avatarValue}" alt="avatar">`
    :state.user.avatarValue;
  const badgesHtml=state.user.earnedBadges.length
    ?state.user.earnedBadges.map(id=>{
        const b=BADGES.find(x=>x.id===id);if(!b)return'';
        return`<div class="badge-row"><span class="chip">${b.emoji} ${b.name}</span><button class="badge-share-btn" data-badge="${b.id}">📤 paylaş</button></div>`;
      }).join('')
    :`<span class="muted" style="font-size:.85rem">Henüz rozet yok.</span>`;
  el.innerHTML=`
    <div class="profile-top">
      <div class="avatar-wrap" id="avatarWrap"><div class="avatar">${avatarInner}</div><div class="avatar-edit-hint">✏</div></div>
      <div class="profile-meta">
        <div class="profile-name-row">
          <span class="profile-name">${state.user.name}</span>
          <button class="edit-name-btn" id="editProfileBtn">✏️ düzenle</button>
        </div>
        <div class="profile-stats">
          <div class="stat-box"><div class="stat-val">${state.user.xp}</div><div class="stat-lbl">XP</div></div>
          <div class="stat-box"><div class="stat-val">${level}</div><div class="stat-lbl">Seviye</div></div>
          <div class="stat-box"><div class="stat-val">${state.user.totalQueries}</div><div class="stat-lbl">Sorgu</div></div>
        </div>
      </div>
    </div>
    <div style="margin-top:14px">${badgesHtml}</div>`;
  document.getElementById("editProfileBtn")?.addEventListener("click",openProfileModal);
  document.getElementById("avatarWrap")?.addEventListener("click",openProfileModal);
  el.querySelectorAll('.badge-share-btn').forEach(btn=>btn.addEventListener("click",()=>openShareModal(btn.dataset.badge)));
}

// RENDER RESULT
function renderResult(brand,alts=[]){
  const el=document.getElementById("result");
  const score=calcScore(brand.scores);const grade=getGrade(score);
  const metrics=Object.entries(brand.scores).map(([k,v])=>`
    <div class="metric-item">
      <div class="metric-row"><span class="metric-key">${MLABELS[k]||k}</span><span class="metric-val">${v}</span></div>
      <div class="bar"><div class="bar-fill" style="width:${v}%"></div></div>
    </div>`).join('');
  const issues=brand.issues?.length
    ?`<ul class="issue-list">${brand.issues.map(i=>`<li>${i}</li>`).join('')}</ul>`
    :`<p class="muted" style="font-size:.875rem">Risk/issue bulunamadı.</p>`;
  const certs=brand.certifications?.length
    ?brand.certifications.map(c=>`<span class="chip">✓ ${c}</span>`).join('')
    :`<span class="muted" style="font-size:.85rem">Sertifika bilgisi yok.</span>`;
  const altsHtml=alts.length
    ?alts.map(a=>`<div class="alt-card" data-id="${a.id}"><span>${a.name}</span><span class="alt-score">${a.computedScore}</span></div>`).join('')
    :`<span class="muted" style="font-size:.85rem">Aynı kategoride daha yüksek puanlı alternatif bulunamadı.</span>`;
  const lowHint=score<55&&alts.length
    ?`<div class="switch-hint">Bu marka düşük puanlı. Daha sürdürülebilir bir seçenek için geçiş yapabilirsin.</div>
      <div class="action-row"><button id="switchBtn">Önerilen Markaya Geç (+50 XP)</button></div>`:'';
  el.innerHTML=`
    <div class="score-header">
      <div><div class="brand-name">${brand.name}</div><div class="brand-cat">${brand.cat}</div></div>
      <div class="score-badge ${grade.cls}"><span class="score-num">${score}</span><span class="score-grade">${grade.label}</span></div>
    </div>
    <h3>Boyut Skorları</h3><div class="metrics-grid">${metrics}</div>
    <h3>Risk & Sorunlar</h3>${issues}
    <h3>Sertifikalar</h3><div class="chips">${certs}</div>
    <h3>Alternatif Öneriler</h3><div class="chips">${altsHtml}</div>
    ${lowHint}`;
  el.querySelectorAll('.alt-card[data-id]').forEach(card=>{
    card.addEventListener('click',()=>{const b=state.brands.find(x=>x.id===card.dataset.id);if(b){document.getElementById("searchInput").value=b.name;runSearch(b);}});
  });
  document.getElementById("switchBtn")?.addEventListener("click",()=>{
    const best=alts[0];if(!best)return;
    state.user.xp+=50;state.user.switchCount=(state.user.switchCount||0)+1;
    state.selectedBrand=best;
    const earned=evalBadges();renderProfile();renderResult(best,findAlts(best));
    if(earned.length)earned.forEach(b=>showToast(`${b.emoji} ${b.name} rozetini kazandın! +${b.xp} XP`));
    else showToast(`♻️ Geçiş yapıldı! +50 XP`);
  });
}

// PROFILE MODAL
function openProfileModal(){
  document.getElementById("editName").value=state.user.name;
  document.querySelectorAll('.avatar-opt').forEach(o=>o.classList.toggle('selected',o.dataset.emoji===state.user.avatarValue));
  document.getElementById("profileModal").classList.add('open');
}
function closeProfileModal(){document.getElementById("profileModal").classList.remove('open');}

// SHARE MODAL
function openShareModal(badgeId){
  const badge=BADGES.find(b=>b.id===badgeId);if(!badge)return;
  document.getElementById("shareBadgeEmoji").textContent=badge.emoji;
  document.getElementById("shareBadgeName").textContent=badge.name;
  document.getElementById("shareBadgeUser").textContent=`@${state.user.name} · YesilPuan`;
  const shareText=`${badge.emoji} "${badge.name}" rozetini YesilPuan'da kazandım! 🌱 Sürdürülebilir markaları keşfet. #YesilPuan #Sürdürülebilirlik`;
  document.getElementById("shareTwitter").onclick=()=>window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`,'_blank');
  document.getElementById("shareWhatsApp").onclick=()=>window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`,'_blank');
  document.getElementById("shareCopy").onclick=()=>navigator.clipboard.writeText(shareText).then(()=>showToast("📋 Metin kopyalandı!"));
  document.getElementById("shareModal").classList.add('open');
}
function closeShareModal(){document.getElementById("shareModal").classList.remove('open');}

// SEARCH
function findBrand(q){const n=norm(q);if(!n)return null;return state.brands.find(b=>norm(b.name)===n||norm(b.id)===n)||null;}
function runSearch(brand){
  const msg=document.getElementById("searchMessage");
  if(!brand){msg.textContent="Marka bulunamadı. Örnek: Koton, Arçelik, Trendyol.";msg.className="danger";return;}
  state.selectedBrand=brand;state.user.totalQueries+=1;state.user.xp+=10;state.user.searchedBrands.add(brand.id);
  const earned=evalBadges();renderProfile();renderResult(brand,findAlts(brand));
  if(earned.length){earned.forEach(b=>showToast(`${b.emoji} ${b.name} rozetini kazandın! +${b.xp} XP`));msg.textContent="Rozet kazanıldı! 🎉";}
  else msg.textContent="Sonuç güncellendi.";
  msg.className="muted";
}

// BIND EVENTS
function bindEvents(){
  const inp=document.getElementById("searchInput");
  document.getElementById("searchBtn").addEventListener("click",()=>runSearch(findBrand(inp.value)));
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")runSearch(findBrand(inp.value));});
  document.getElementById("quickList").addEventListener("click",e=>{
    const id=e.target.getAttribute("data-id");if(!id)return;
    const b=state.brands.find(x=>x.id===id);if(!b)return;
    inp.value=b.name;runSearch(b);
  });
  // Profile modal
  document.getElementById("cancelEdit").addEventListener("click",closeProfileModal);
  document.getElementById("profileModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeProfileModal();});
  document.getElementById("avatarPicker").addEventListener("click",e=>{
    const opt=e.target.closest('.avatar-opt');if(!opt)return;
    document.querySelectorAll('.avatar-opt').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
  });
  document.getElementById("avatarUpload").addEventListener("change",e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{state.user.avatarType="img";state.user.avatarValue=ev.target.result;renderProfile();closeProfileModal();};
    reader.readAsDataURL(file);
  });
  document.getElementById("saveEdit").addEventListener("click",()=>{
    const nv=document.getElementById("editName").value.trim();if(nv)state.user.name=nv;
    const sel=document.querySelector('.avatar-opt.selected');
    if(sel){state.user.avatarType="emoji";state.user.avatarValue=sel.dataset.emoji;}
    renderProfile();closeProfileModal();
  });
  // Share modal
  document.getElementById("closeShare").addEventListener("click",closeShareModal);
  document.getElementById("shareModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeShareModal();});
}

// INIT
async function initialize(){
  try{const r=await fetch("./brands.json");if(!r.ok)throw new Error();state.brands=await r.json();}
  catch{
    state.brands=BRANDS;
    const msg=document.getElementById("searchMessage");
    msg.textContent="Offline mod: Yerel yedek veri kullanılıyor.";msg.className="muted";
  }
  renderQuickList();renderProfile();bindEvents();
}
initialize().catch(()=>{
  const msg=document.getElementById("searchMessage");
  msg.textContent="Veriler yüklenemedi.";msg.className="danger";
});
</script>
